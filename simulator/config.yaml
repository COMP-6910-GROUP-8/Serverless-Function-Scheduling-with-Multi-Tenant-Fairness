simulation:
  random_seed: 42

tenants:
  large:
    count: 5
    arrival_rate: [ 50, 100 ]
    function_profile:
      heavy: 0.6
      medium: 0.3
      lightweight: 0.1
  medium:
    count: 10
    arrival_rate: [ 10, 30 ]
    function_profile:
      heavy: 0.2
      medium: 0.5
      lightweight: 0.3
  small:
    count: 10
    arrival_rate: [ 1, 5 ]
    function_profile:
      heavy: 0.1
      medium: 0.2
      lightweight: 0.7

servers:
  count: 8
  cpu_capacity: 4000
  memory_capacity: 8192

function_archetypes:
  lightweight:
    cpu: 100
    memory: 64
    duration: [ 0.005, 0.020 ]
  medium:
    cpu: 250
    memory: 256
    duration: [ 0.030, 0.080 ]
  heavy:
    cpu: 500
    memory: 512
    duration: [ 0.100, 0.300 ]

cold_start:
  penalty: 0.050
  container_ttl: 300

sla:
  p95_latency_threshold: 1.000
  min_throughput_ratio: 0.80

scheduler:
  sliding_window: 5.0
